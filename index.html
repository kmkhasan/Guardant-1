<html lang="en">

    <meta charset="UTF-8" />

    <title>My Google AI Studio App</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" by making it writable if possible
      try {
        const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (desc && !desc.writable && !desc.set && desc.configurable) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { /* ignore or handle */ },
            configurable: true
          });
        } else if (desc && desc.get && !desc.set) {
          // If it's a getter but not configurable, we can't do much natively, but we can try redefining on globalThis prototype if it's there
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
